<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>데저트 스트라이크 — 3진영 라인 디펜스</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#1a1610;font-family:"Malgun Gothic","맑은 고딕",system-ui,sans-serif;color:#eee;user-select:none;-webkit-user-select:none;}
  #game{position:absolute;inset:0;display:block;cursor:crosshair;}
  #topbar{position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 14px;background:linear-gradient(#000a,#0000);z-index:5;pointer-events:none;}
  .baseStat{flex:0 0 28%;max-width:320px;}
  .baseStat .lbl{font-size:12px;color:#cbb486;margin-bottom:3px;}
  .hpwrap{height:14px;background:#0008;border:1px solid #3a3326;border-radius:3px;overflow:hidden;}
  .hpfill{height:100%;width:100%;}
  .center{flex:1;text-align:center;}
  .wave{font-size:17px;font-weight:700;color:#f0e2bf;}
  .wsub{font-size:12px;color:#b8a877;}
  .stat{position:absolute;top:56px;left:14px;font-size:16px;font-weight:700;color:#ffd24a;z-index:5;text-shadow:0 1px 2px #000;}
  .stat small{color:#9bd06a;font-weight:400;font-size:12.5px;}
  .stat .sup{color:#cfd6e0;font-size:12.5px;font-weight:400;}
  #buildbar{position:absolute;left:0;right:0;bottom:0;display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:flex-start;gap:4px;padding:6px 8px;background:linear-gradient(#0000,#000c 35%);z-index:5;max-height:42%;overflow:auto;}
  .grp{display:flex;flex-wrap:wrap;gap:4px;align-items:stretch;padding:3px 5px;border:1px solid #2c2718;border-radius:8px;}
  .grp .gl{width:100%;font-size:10px;color:#8a7f5e;letter-spacing:.02em;margin-bottom:1px;white-space:nowrap;overflow:hidden;}
  .bbtn{position:relative;min-width:80px;max-width:110px;padding:5px 7px 6px;background:#241f16;border:1.5px solid #4a4030;border-radius:7px;cursor:pointer;text-align:center;transition:.08s;}
  .bbtn:hover{background:#2e2819;border-color:#7a6840;}
  .bbtn:active{transform:scale(0.94);background:#3a2e16;border-color:#ffd24a;}
  #tooltip{position:fixed;z-index:30;display:none;max-width:290px;padding:10px 12px;background:#1c1810;border:1.5px solid #6a5a38;border-radius:8px;box-shadow:0 6px 26px #000c;pointer-events:none;}
  .tt-name{font-size:15px;font-weight:700;color:#f0e2bf;}
  .tt-tier{font-size:11px;color:#9bb0c8;} .tt-cost{float:right;color:#ffd24a;font-size:13px;font-weight:700;}
  .tt-role{font-size:12.5px;color:#b8a877;margin:6px 0 8px;line-height:1.5;}
  .tt-grid{display:grid;grid-template-columns:auto 1fr auto 1fr;gap:3px 8px;font-size:11.5px;}
  .tt-grid span{color:#8a8270;} .tt-grid b{color:#e8e8ee;font-weight:600;}
  .tt-foot{margin-top:8px;font-size:11px;color:#9bb0c8;border-top:1px solid #3a3326;padding-top:6px;}
  .tt-skill{margin-top:7px;font-size:12px;color:#ffd24a;font-weight:600;}
  .bbtn.sel{border-color:#ffd24a;background:#34291a;}
  .bbtn.poor{opacity:.4;}
  .bbtn.lock{opacity:.5;filter:grayscale(.6);}
  .bbtn .bn{font-size:12.5px;font-weight:700;color:#f0e2bf;white-space:nowrap;}
  .bbtn .bc{font-size:11.5px;color:#ffd24a;margin-top:1px;}
  .bbtn .bx{font-size:10px;color:#9bb0c8;margin-top:1px;}
  .bbtn .bv{font-size:11px;font-weight:700;margin-top:2px;line-height:1.2;color:#cfcabf;}
  .bbtn .bv .cbadge{display:inline-block;color:#15110a;font-weight:800;font-size:11px;padding:0 5px;border-radius:5px;margin-left:2px;}
  #buildbar .bbtn[data-buy]{width:108px;height:88px;overflow:hidden;} #buildbar .bbtn[data-buy] .bn{white-space:normal;line-height:1.1;}
  .badge{display:inline-block;font-size:9px;padding:0 4px;border-radius:6px;margin-top:2px;font-weight:700;}
  .t1{border-left:3px solid #8fae5a;} .t2{border-left:3px solid #5d90e0;} .t3{border-left:3px solid #c98ae0;}
  .t4{border-left:3px solid #e08a4a;} .t5{border-left:3px solid #e05050;}
  .rps-shield{border-left:4px solid #6ad07a;} .rps-sniper{border-left:4px solid #37d0c8;} .rps-assault{border-left:4px solid #ff6a5a;} .rps-mech{border-left:4px solid #e0a040;} .rps-artillery{border-left:4px solid #5aa0ff;} .rps-all{border-left:4px solid #9bf0ff;}
  .build{border-color:#caa23a;background:#2a2412;} .bbtn.evo{border-top:2px solid #b06ad0;} .bbtn.rsh{border-color:#7ad0ff;background:#13212a;}
  .bbtn.hero{border-color:#e6b84a;background:#2e2614;min-width:118px;max-width:150px;}
  .bbtn.hero .bn{white-space:normal;font-size:11.5px;line-height:1.25;color:#ffd87a;}
  .tech{border-color:#caa23a;} .upg{border-color:#5aa860;} .twr{border-color:#5d90e0;} .inc{border-color:#caa23a;}
  .bbtn .sellbtn{position:absolute;top:-7px;right:-7px;width:22px;height:22px;line-height:19px;text-align:center;font-size:18px;font-weight:800;color:#ffc4c4;background:#5a1e1e;border:1.5px solid #c25a5a;border-radius:50%;z-index:3;cursor:pointer;box-shadow:0 1px 4px #0008;}
  .bbtn .sellbtn:active{background:#8a2424;transform:scale(.9);}
  .bbtn.elitebtn{border-color:#ffd24a;background:#34290f;box-shadow:0 0 10px #ffd24a55;}
  .bbtn.elitebtn .bn{color:#ffe089;white-space:normal;line-height:1.15;}
  @media (max-width:820px),(pointer:coarse){
    .bbtn{min-width:58px;max-width:82px;padding:3px 4px 5px;}
    .bbtn .bn{font-size:10px;white-space:normal;line-height:1.1;}
    .bbtn .bc{font-size:9.5px;} .bbtn .bx{font-size:8px;} .bbtn .bv{font-size:9px;} .bbtn .bv .cbadge{font-size:9px;padding:0 4px;}
    #buildbar .bbtn[data-buy]{width:80px;height:90px;overflow:hidden;}
    .bbtn.hero{min-width:82px;max-width:110px;} .bbtn.hero .bn{font-size:9.5px;}
    .grp{padding:2px 3px;gap:3px;} .grp .gl{font-size:8px;margin-bottom:0;}
    #buildbar{gap:3px;padding:3px 4px;max-height:54%;}
    .stat{font-size:12px;top:50px;left:8px;}
    .bbtn .sellbtn{width:24px;height:24px;line-height:21px;top:-8px;right:-8px;}
  }
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:rgba(15,12,8,0.88);z-index:20;padding:20px;}
  .hidden{display:none!important;}
  h1{font-size:clamp(28px,5.5vw,52px);font-weight:800;letter-spacing:.03em;color:#f0e2bf;text-shadow:0 0 22px rgba(255,180,60,.4);}
  .sub{color:#b8a877;margin-top:10px;font-size:clamp(13px,2.3vw,16px);line-height:1.6;max-width:600px;}
  .facRow{display:flex;gap:16px;margin-top:26px;flex-wrap:wrap;justify-content:center;}
  .facCard{width:230px;padding:18px 16px;border:2px solid #2a2c3c;border-radius:14px;background:#14120d;cursor:pointer;transition:.15s;}
  .facCard:hover{transform:translateY(-5px);background:#1a1710;}
  .facCard .fn{font-size:24px;font-weight:800;margin-bottom:8px;}
  .facCard .fp{font-size:12.5px;color:#b0a888;line-height:1.55;}
  .btn{margin-top:24px;padding:12px 32px;font-size:17px;font-weight:700;color:#1a1610;background:#ffd24a;border:none;border-radius:10px;cursor:pointer;}
  .btn:hover{background:#ffe27a;}
  .win h1{color:#7bd66a;} .lose h1{color:#e8584a;}
  .strikeBtn{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:6;padding:8px 20px;font-size:15px;font-weight:700;color:#1a1610;background:#ffae3a;border:2px solid #c25a1a;border-radius:10px;cursor:pointer;box-shadow:0 3px 12px #0008;}
  .strikeBtn:hover{background:#ffc24a;}
  .strikeBtn:disabled{background:#4a4030;color:#9a8a6a;border-color:#3a3022;cursor:default;box-shadow:none;}
  .strikeBtn.aiming{background:#ff5a3a;color:#fff;border-color:#ffd24a;box-shadow:0 0 18px #ff5a3a;}
  .strikePrompt{position:fixed;top:124px;left:50%;transform:translateX(-50%);z-index:7;padding:11px 26px;font-size:18px;font-weight:800;color:#fff;background:rgba(200,40,20,.92);border:2px solid #ffd24a;border-radius:12px;box-shadow:0 0 28px #ff5a3acc;pointer-events:none;white-space:nowrap;animation:strikePulse .8s ease-in-out infinite;}
  @keyframes strikePulse{0%,100%{transform:translateX(-50%) scale(1);opacity:.92;}50%{transform:translateX(-50%) scale(1.05);opacity:1;}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="topbar">
  <div class="baseStat"><div class="lbl" id="pLbl">아군 본진</div><div class="hpwrap"><div class="hpfill" id="pHp" style="background:#3a8fe6"></div></div></div>
  <div class="center"><div class="wave" id="waveLbl">웨이브 1</div><div class="wsub" id="waveSub">진격까지 0초</div></div>
  <div class="baseStat" style="text-align:right"><div class="lbl" id="eLbl">적 본진</div><div class="hpwrap"><div class="hpfill" id="eHp" style="background:#e85a4a;margin-left:auto"></div></div></div>
</div>
<div class="stat" id="statLbl"></div>
<button id="strikeBtn" class="strikeBtn hidden">🌀 전장 초기화 [3]</button>
<div id="strikePrompt" class="strikePrompt hidden"></div>
<div id="buildbar"></div>
<div id="tooltip"></div>

<div id="startScreen" class="overlay">
  <h1>데저트 스트라이크</h1>
  <div class="sub">진영을 골라라. 자금으로 유닛을 사면 매 웨이브 자동 진격해 적 본진을 친다.<br>5종 가위바위보(<b style="color:#6ad07a">방패</b>·<b style="color:#37d0c8">저격</b>·<b style="color:#ff6a5a">돌격</b>·<b style="color:#e0a040">기갑</b>·<b style="color:#5aa0ff">포격</b>) — 각자 2종을 ×2로 잡고 2종에 약하다. 상성을 맞춰 라인을 밀어내라.</div>
  <div class="facRow" id="facRow"></div>
  <div class="sub" style="color:#8a7f5e;margin-top:18px">탭/클릭 구매 · <b style="color:#9bc77a">➖버튼 판매</b> · <b style="color:#ffd24a">6기→★정예</b> · <b style="color:#6ad07a">방패</b>·<b style="color:#37d0c8">저격</b>·<b style="color:#ff6a5a">돌격</b>·<b style="color:#e0a040">기갑</b>·<b style="color:#5aa0ff">포격</b> 5종 상성 · F=전장 초기화(적 전장 유닛 전멸)</div>
  <div class="sub" style="color:#8a7f5e;margin-top:4px">맵 이동 = 방향키 / A·D / 화면 좌우 끝 / 미니맵 클릭 (평소엔 전선을 자동 추적)</div>
</div>
<div id="endScreen" class="overlay hidden">
  <h1 id="endTitle">—</h1><div class="sub" id="endSub"></div>
  <button class="btn" id="restartBtn">다시 작전</button>
</div>
